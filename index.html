<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>礼品提货兑换</title>
<style>
/* 基础重置与背景 */
body {
    background: linear-gradient(135deg, #f4f6f9 0%, #ffffff 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    padding: 20px 15px;
    margin: 0;
    min-height: 100vh;
    color: #333;
}

/* 主容器卡片化 */
.box {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    padding: 25px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    position: relative;
    border-top: 5px solid #e61a1a;
}

.title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #1a1a1a;
    letter-spacing: 1px;
}

.sub-title {
    font-size: 15px;
    color: #666;
    margin-bottom: 15px;
    text-align: center;
}

/* 表单输入框优化 */
input, textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 14px 16px;
    margin: 8px 0;
    border: 1px solid #eaeaea;
    background-color: #fafbfc;
    border-radius: 10px;
    font-size: 15px;
    color: #333;
    transition: all 0.3s ease;
    outline: none;
}

input:focus, textarea:focus {
    border-color: #ff4b4b;
    background-color: #fff;
    box-shadow: 0 0 0 3px rgba(238, 9, 121, 0.1);
}

textarea { resize: none; }

/* 按钮炫酷渐变与交互 */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ff4b4b, #e61a1a);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 600;
    margin-top: 15px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(230, 26, 26, 0.3);
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(230, 26, 26, 0.4);
}
button:disabled {
    opacity: 0.6;
    transform: none;
    cursor: not-allowed;
}
.hide { display: none; }

/* ★ 套餐选择优化：改成一排展示2个 */
.package-wrap {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 20px 0;
}

.package-item {
    background: #fff;
    border: 3px solid #f0f0f0;
    border-radius: 10px;
    padding: 5px; 
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
}

.package-item:hover { border-color: #ff9d9d; }

.package-item.active {
    border-color: #e61a1a;
    background: #fffafa;
}

.package-item.active::after {
    content: '已选';
    position: absolute;
    top: 0;
    right: 0;
    background: #e61a1a;
    color: #fff;
    font-size: 12px;
    padding: 4px 8px;
    border-bottom-left-radius: 8px;
    border-top-right-radius: 6px;
    font-weight: bold;
}

.package-item img {
    width: 100%;
    height: auto; 
    display: block;
    border-radius: 6px;
}

/* 地址省市区三联排 */
.address-group { display: flex; gap: 8px; }
.address-group input { flex: 1; text-align: center; padding: 14px 8px; }

/* 商家后台区块 */
.order-box {
    max-width: 420px;
    margin: 40px auto 20px;
    background: #fdfdfd;
    padding: 20px;
    border-radius: 15px;
    border: 1px dashed #ccc;
}
.order-box .title { font-size: 16px; color: #888; margin-bottom: 15px; }
.order-item { background: #f5f5f5; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.6; color: #555; }
.used { color: #999; text-decoration: line-through; margin-left: 5px; }
</style>
</head>
<body>

<div class="box">
  <div class="title">尊享礼品提货中心</div>
  
  <!-- 第一步：卡号密码登录 -->
  <div id="loginBox">
    <div class="sub-title">请验证您的兑换卡密</div>
    <input type="text" id="cardno" placeholder="输入18位卡号" maxlength="18">
    <input type="password" id="pwd" placeholder="输入8位卡密" maxlength="8">
    <button onclick="checkCard()">立即验证</button>
  </div>

  <!-- 第二步：选择套餐 -->
  <div id="packageBox" class="hide">
    <div class="title" style="font-size:18px; margin-bottom: 5px;">请点击选择以下套餐</div>
    <div class="sub-title" style="font-size:13px; color:#e61a1a;">（仅限选1个，点击图片即可选中）</div>
    
    <div class="package-wrap">
      <div class="package-item" data-pkg="A套餐" onclick="selectPkg(this)">
        <img src="A.jpg" alt="A套餐">
      </div>
      <div class="package-item" data-pkg="B套餐" onclick="selectPkg(this)">
        <img src="B.jpg" alt="B套餐">
      </div>
      <div class="package-item" data-pkg="C套餐" onclick="selectPkg(this)">
        <img src="C.jpg" alt="C套餐">
      </div>
      <div class="package-item" data-pkg="D套餐" onclick="selectPkg(this)">
        <img src="D.jpg" alt="D套餐">
      </div>
    </div>
    <button onclick="goFillInfo()">已选好，填写收货地址</button>
  </div>

  <!-- 第三步：填写收货信息 -->
  <div id="formBox" class="hide">
    <div class="title" style="font-size:18px">填写收货信息</div>
    <input type="text" placeholder="收货人真实姓名" id="name">
    <input type="tel" placeholder="联系电话（11位手机号）" id="phone" maxlength="11">
    
    <div class="address-group">
      <input type="text" placeholder="省份" id="province">
      <input type="text" placeholder="城市" id="city">
      <input type="text" placeholder="区/县" id="area">
    </div>
    
    <textarea placeholder="详细街道、门牌号" id="detailAddr" rows="3"></textarea>
    <button id="submitBtn" onclick="submitOrder()">确认无误，提交发货</button>
  </div>
</div>

<!-- 商家后台 -->
<div class="order-box">
  <div class="title">- 内部展示：商家兑换记录 -</div>
  <div id="orderList">
    <div style="text-align:center;color:#ccc;font-size:13px;padding:10px 0;">暂无订单记录</div>

</div>

var usedCard = [];
var selectPackage = "";
var nowCard = "";

function checkCard(){
  let c = document.getElementById("cardno").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if(usedCard.includes(c)){
    alert("该卡号已兑换过，无法再次使用");
    return;
  }
  if(c.length !== 18){
    alert("请输入18位卡号");
    return;
  }
  if(p.length !== 8){
    alert("请输入8位卡密");
    return;
  }
  if(cardList[c] && cardList[c] === p){
    nowCard = c;
    document.getElementById("loginBox").classList.add("hide");
    document.getElementById("packageBox").classList.remove("hide");
    window.scrollTo(0,0);
  }else{
    alert("卡号或密码错误");
  }
}

function selectPkg(el){
  document.querySelectorAll(".package-item").forEach(item=>{
    item.classList.remove("active");
  });
  el.classList.add("active");
  selectPackage = el.dataset.pkg;
}

function goFillInfo(){
  if(!selectPackage){
    alert("请先点击图片选择一个套餐哦~");
    return;
  }
  document.getElementById("packageBox").classList.add("hide");
  document.getElementById("formBox").classList.remove("hide");
  window.scrollTo(0,0);
}

// 使用 Web3Forms 发送邮件
async function sendOrderEmail(card, pkg, name, phone, fullAddr) {
  // 构建邮件内容
  const subject = `🎁 礼品兑换订单 - ${pkg}`;
  const message = `
    兑换卡号: ${card}
    所选套餐: ${pkg}
    收货人: ${name}
    联系电话: ${phone}
    收货地址: ${fullAddr}
    提交时间: ${new Date().toLocaleString()}
  `;
  
  const formData = {
    access_key: WEB3FORMS_ACCESS_KEY,
    to: RECEIVER_EMAIL,
    subject: subject,
    message: message,
    from_name: "礼品兑换系统",
    // 可选防垃圾
    botcheck: ""
  };
  
  try {
    const response = await fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Accept: "application/json"
      },
      body: JSON.stringify(formData)
    });
    const result = await response.json();
    if (result.success) {
      console.log("邮件发送成功");
      return true;
    } else {
      console.error("邮件发送失败:", result);
      alert("邮件通知发送失败，但订单已记录。请联系客服。");
      return false;
    }
  } catch (error) {
    console.error("请求异常:", error);
    alert("网络错误，邮件未发送，但订单已记录。");
    return false;
  }
}

async function submitOrder(){
  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let province = document.getElementById("province").value.trim();
  let city = document.getElementById("city").value.trim();
  let area = document.getElementById("area").value.trim();
  let detailAddr = document.getElementById("detailAddr").value.trim();

  if(!/^1\d{10}$/.test(phone)){
    alert("请输入正确的11位手机号码");
    return;
  }
  if(!name || !province || !city || !area || !detailAddr){
    alert("请将收货信息填写完整！");
    return;
  }

  let fullAddr = province + city + area + detailAddr;
  usedCard.push(nowCard);

  // 更新商家后台记录
  let orderBox = document.getElementById("orderList");
  if(orderBox.innerText.includes("暂无订单记录")) orderBox.innerHTML = "";
  
  let orderHtml = `
  <div class="order-item">
    <div style="font-weight:bold;color:#111;margin-bottom:5px;">套餐：${selectPackage}</div>
    <div>卡号：<span class="used">${nowCard}</span></div>
    <div>收件：${name} (${phone})</div>
    <div>地址：${fullAddr}</div>
    <div style="font-size:12px; color:#666; margin-top:5px;">提交于 ${new Date().toLocaleString()}</div>
  </div>
  `;
  orderBox.innerHTML = orderHtml + orderBox.innerHTML; // 最新在上方
  
  // 禁用提交按钮避免重复提交
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "提交中...";
  
  // 发送邮件（不阻塞界面）
  await sendOrderEmail(nowCard, selectPackage, name, phone, fullAddr);
  
  alert("🎉 兑换提交成功，商家将尽快安排发货！");
  
  // 重置整个流程，回到卡密登录界面
  location.reload(); 
}
